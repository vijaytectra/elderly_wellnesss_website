server {
    listen 80;
    listen [::]:80;
    server_name theelderlywellness.com www.theelderlywellness.com;

    root /var/www/html/theelderlywellness.com;
    index index.html index.php;

    # Strip /index.html from URLs (clean permalinks)
    if ($request_uri ~* "^(.+)/index\.html/?$") {
        return 301 $1;
    }

    # Rescue blog posts linked without /blogs/ (e.g. /exercises-for-seniors-over-75)
    location ~ ^/(activities\-of\-daily\-living\-adls\-for\-parents|address\-loneliness\-and\-depression\-in\-senior\-citizens|age\-related\-health\-conditions|alzheimers\-and\-dementia\-care\-services\-for\-senior\-citizens|different\-ways\-to\-prevent\-osteoporosis\-in\-senior\-citizens\-for\-stronger\-bone\-health|early\-signs\-of\-dementia\-in\-elderly\-parents|elderly\-care\-services\-in\-adambakkam|elderly\-care\-services\-in\-adyar|elderly\-care\-services\-in\-alandur|elderly\-care\-services\-in\-alapakkam|elderly\-care\-services\-in\-alwarpet|elderly\-care\-services\-in\-alwarthirunagari|elderly\-care\-services\-in\-ambattur|elderly\-care\-services\-in\-chennai|essential\-care\-regarding\-arthritis\-for\-senior\-citizens\-to\-enhance\-their\-mobility\-and\-comfort|essential\-grooming\-hygiene\-tips\-elderly|exercises\-for\-seniors\-over\-75|fall\-prevention\-home\-safety\-checklist\-elderly\-chennai|finding\-the\-right\-balance\-between\-professional\-care\-and\-family\-involvement\-for\-senior\-citizens|heres\-why\-regular\-checkups\-matter\-so\-much\-for\-seniors|home\-care\-vs\-assisted\-living\-chennai|home\-modifications\-for\-elder\-safety|home\-modifications\-for\-seniors|how\-elderly\-wellness\-works|how\-proper\-meals\-and\-medication\-assistance\-improve\-senior\-health\-and\-well\-being|how\-to\-hire\-best\-caregiver\-for\-seniors\-in\-chennai|how\-to\-increase\-sodium\-levels\-in\-elderly\-at\-home|journey\-of\-eldery|loneliness\-mental\-wellbeing\-elderly\-parents|necessary\-lifestyle\-changes\-to\-prevent\-cardiovascular\-diseases\-for\-elderly\-citizens|nutritious\-diets\-for\-senior\-health|personal\-hygiene\-and\-diaper\-change\-services\-for\-senior\-citizens|post\-hospital\-recovery\-care\-at\-home\-chennai|what\-is\-caregivers|what\-is\-elderly|what\-is\-the\-importance\-of\-regular\-exercising\-for\-senior\-citizens)/?$ {
        return 301 /blogs/$1/;
    }

    # Static site (everything except /blogs/)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Blogs (static HTML under /blogs/)
    location /blogs/ {
        try_files $uri $uri/ $uri/index.html /blogs/index.php?$args;
    }

    location ~ ^/blogs/.+\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name theelderlywellness.com www.theelderlywellness.com;

    root /var/www/html/theelderlywellness.com;
    index index.html index.php;

    # Strip /index.html from URLs (clean permalinks)
    if ($request_uri ~* "^(.+)/index\.html/?$") {
        return 301 $1;
    }

    # Static site (everything except /blogs/)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Blogs (static HTML under /blogs/)
    location /blogs/ {
        try_files $uri $uri/ $uri/index.html /blogs/index.php?$args;
    }

    location ~ ^/blogs/.+\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
